    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-soft: rgba(201,168,76,0.15);
      --gold-glow: rgba(201,168,76,0.08);
      --white: #ffffff;
      --white-60: rgba(255,255,255,0.60);
      --white-35: rgba(255,255,255,0.35);
      --white-10: rgba(255,255,255,0.10);
      --white-06: rgba(255,255,255,0.06);
      --black: #060608;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* ─── BACKGROUND ─── */
    #bg-photo {
      position: fixed; inset: 0; z-index: 0;
      background-image: url('https://images.unsplash.com/photo-1533106497176-45ae19e68ba2?w=1920&q=80&fit=crop');
      background-size: cover;
      background-position: center 60%;
      filter: blur(6px) brightness(0.38) saturate(1.2);
      transform: scale(1.06);
    }

    #bg-gradient {
      position: fixed; inset: 0; z-index: 1;
      background:
        linear-gradient(180deg,
          rgba(6,6,8,0.55) 0%,
          rgba(6,6,8,0.18) 40%,
          rgba(6,6,8,0.50) 100%
        ),
        linear-gradient(90deg,
          rgba(6,6,8,0.70) 0%,
          transparent 35%,
          transparent 65%,
          rgba(6,6,8,0.30) 100%
        );
    }

    /* ─── LAYOUT SHELL ─── */
    #shell {
      position: relative; z-index: 10;
      width: 100vw; height: 100vh;
      display: grid;
      grid-template-rows: 88px 1fr;
      grid-template-columns: 200px 1fr;
    }

    /* ─── HEADER ─── */
    #header {
      grid-column: 1 / -1;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 14px;
      position: relative;
    }

    #wordmark {
      font-family: 'Oswald', sans-serif;
      font-weight: 300;
      font-size: clamp(2rem, 4.5vw, 3.4rem);
      letter-spacing: 0.55em;
      text-transform: uppercase;
      color: var(--white);
      padding-right: 0.55em;
      position: relative;
      user-select: none;
    }

    #header-line {
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 420px;
      height: 0.5px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(201,168,76,0.5) 30%,
        rgba(255,255,255,0.3) 50%,
        rgba(201,168,76,0.5) 70%,
        transparent 100%
      );
    }

    /* ─── SIDEBAR ─── */
    #sidebar {
      grid-row: 2;
      grid-column: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
      padding: 0 0 0 28px;
    }
